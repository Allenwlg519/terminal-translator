# 终端翻译工具配置文件

# 百度翻译 API 配置
baidu:
  app_id: "20260525002619981"  # 在 https://fanyi-api.baidu.com/ 注册获取
  secret_key: "dGj3F6oxkmJO1X6dfJxE"

# 监听设置
monitor:
  # 检测间隔（秒）
  interval: 0.5
  # 英文字符占比阈值（触发翻译）
  english_threshold: 0.5
  # 最小文本长度
  min_length: 10
  # 忽略的关键词（不翻译，使用单词边界匹配）
  ignore_keywords:
    - "npm"
    - "cd"
    - "ls"

# Tesseract OCR 引擎路径（安装后修改此路径）
tesseract_path: "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"

# 悬浮窗设置
ui:
  # 窗口透明度 (0.0-1.0)
  opacity: 0.9
  # 字体大小
  font_size: 12
  # 自动隐藏时间（秒，0 表示不自动隐藏）
  auto_hide: 5
  # 窗口位置（right-bottom, right-top, left-bottom, left-top）
  position: "right-bottom"
